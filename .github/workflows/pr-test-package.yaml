name: Publish PR to GitHub Packages

permissions:
  contents: read
  packages: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
        has_component_changes: $({ steps.check_files.outputs.component_changed })
    steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
        
        - name: Check for component file changes
          id: check_files
          run: |
            if git diff --name-only --diff-filter=d $({ github.event.pull_request.base.sha })...$({ github.event.pull_request.head.sha }) | grep -q '\.component\.ts$'; then
              echo "Found changed component files. Proceeding..."
              echo "component_changed=true" >> $GITHUB_OUTPUT 
            else
              echo "No component files changed. Skipping workflow."
              echo "component_changed=false" >> $GITHUB_OUTPUT
            fi
  publish-github-package:
    needs: check-for-changes
    if: github.event.action != 'closed' && needs.check-for-changes.outputs.has_component_changes == 'true'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: cd packages/fhi-designsystem; pnpm lint

      - name: Build
        run: cd packages/fhi-designsystem; pnpm build:github

      - name: Prepare Testing Environment
        run: cd packages/fhi-designsystem; pnpm exec playwright install --with-deps chromium webkit

      - name: Test
        run: cd packages/fhi-designsystem; pnpm test

      - name: Set package version for PR
        run: |
          BRANCH_NAME=$({ github.head_ref | sed 's/[^a-zA-Z0-9.-]/-/g'})
          echo "BRANC_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          cd packages/fhi-designsystem
          npm version "0.0.0-$BRANCH_NAME" --no-git-tag-version

      - name: Delete existing package
        uses: actions/github-script@v7
        with:
          github-token: $({ secrets.GITHUB_TOKEN })
          script: |
            const owner = context.repo.owner;
            const packageName = require(`${process.env.GITHUB_WORKSPACE}/packages/fhi-designsystem/package.json`).name.split('/')[1];
            const packageVersion = `0.0.0-${process.env.BRANCH_NAME}`;
            
            console.log(`Checking for and deleting existing package version: ${packageName}@${packageVersion}`);
            
            try {
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageForOrg({
                package_type: 'npm',
                package_name: packageName,
                org: owner,
              });

              const versionToDelete = versions.find(version => version.name === packageVersion);

              if (versionToDelete) {
                console.log(`Deleting old version ${versionToDelete.name} with ID ${versionToDelete.id}`);
                await github.rest.packages.deletePackageVerionForOrg({
                  package_type: 'npm',
                  package_name: packageName,
                  org: owner,
                  package_version_id: versionToDelete.id,
                });
                console.log(`Successfully deleted package version.`);
              } else {
                console.log('Package version not found, proceeding to publish.');
              }
            } catch (error) {
                console.error(`An error occurred: ${error.message}`);
                throw error;
            }
      
      - name: Publish package to GitHub Packages
        run: cd packages/fhi-designsystem/dist/github; npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const repoOwner = context.repo.owner;
            const packageName = require(`${process.env.GITHUB_WORKSPACE}/packages/fhi-designsystem/package.json`).name;
            const packageVersion = require(`${process.env.GITHUB_WORKSPACE}/packages/fhi-designsystem/dist/github/package.json`).version;
            const body = `📦 The package for this PR has been published to GitHub Packages.\n\nYou can install it using:\n\`\`\`\nnpm install ${packageName}@${packageVersion}\n\`\`\``;
            await github.rest.issues.createComment({ owner: repoOwner, repo: context.repo.repo, issue_number: prNumber, body: body });

  unpublish-github-package:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Delete package version on PR close
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            const branchName = pr.head.ref.replace(/[^a-zA-Z0-9.-]/g, '-');

            const packageName = require(`${process.env.GITHUB_WORKSPACE}/packages/fhi-designsystem/package.json`).name.split('/')[1];
            const packageVersion = `0.0.0-${branchName}`;

            console.log(`PR closed. Attempting to delete package version: ${packageName}@${packageVersion}`);

            try {
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageForOrg({
                package_type: 'npm',
                package_name: packageName,
                org: owner, 
              });
              
              const versionToDelete = versions.find(version => version.name === packageVersion);

              if (versionToDelete) {
                console.log(`Deleting package version ${versionToDelete.name} with ID ${versionToDelete.id}`);
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'npm',
                  package_name: packageName,
                  org: owner,
                  package_version_id: versionToDelete.id,
                });
                console.log(`Successfully deleted package version.`);
              } else {
                console.log('Package version not found. It might have been deleted already or never published.');
              }
            } catch (error) {
              console.error(`Could not delete package version. This might happen if the package was never published. Error: ${error.message}`);
            }

