name: Publish PR to GitHub Packages (Test 2)

permissions:
  contents: read
  issues: write
  packages: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

jobs:
  publish-github-package:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: cd packages/fhi-designsystem; pnpm lint

      - name: Build
        run: cd packages/fhi-designsystem; pnpm build:github
      - name: List npm packages in GitHub Packages (REST API)
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            ORG: FHIDev
            PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
            echo "PR Title: ${{ github.event.pull_request.title }}"
            curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/$ORG/packages/npm/dafn-dummy-package