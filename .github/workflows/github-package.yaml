name: Publish PR to GitHub Packages (Test 2)

permissions:
  contents: read
  issues: write
  packages: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [master]

jobs:
  publish-github-package:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: pnpm i

      - name: Lint
        run: cd packages/fhi-designsystem; pnpm lint

      - name: Build
        run: cd packages/fhi-designsystem; pnpm build:github

      - name: Update package name for staging
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd packages/fhi-designsystem/dist/github
          jq --arg name "designsystem-pull-request-${PR_NUMBER}" '.name = $name' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Delete staging package if it already exists
        env:
            ORG: FHIDev
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
            curl -X DELETE \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/orgs/$ORG/packages/npm/designsystem-pull-request-${PR_NUMBER}

      - name: Publish package to GitHub Packages
        run: npm publish
        working-directory: ./packages/fhi-designsystem/dist/github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
